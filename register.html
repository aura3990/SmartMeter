{% extends "base.html" %}
{% block title %}Register · Smart PG Electricity Bill Calculator{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="container">
    <div class="glass-card auth-card">
      <div class="auth-icon"><i class="bi bi-person-plus fs-4"></i></div>
      <h3 class="mb-1">Create your account</h3>
      <p class="text-muted-soft mb-4">Register once with your room details and starting meter reading.</p>

      <form method="POST" action="{{ url_for('register') }}" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="full_name" class="form-control" placeholder="e.g. Ananya Sharma" value="{{ form.get('full_name', '') }}" required>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Room Number</label>
            <input type="text" name="room_number" class="form-control" placeholder="e.g. B-204" value="{{ form.get('room_number', '') }}" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Mobile Number</label>
            <input type="tel" name="mobile_number" class="form-control" placeholder="10-digit number" pattern="[0-9]{10}" maxlength="10" value="{{ form.get('mobile_number', '') }}" required>
          </div>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Min. 4 characters" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
          </div>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Joining Date</label>
            <input type="date" name="joining_date" class="form-control" value="{{ form.get('joining_date', '') }}" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Initial Meter Reading</label>
            <input type="number" step="0.01" min="0" name="initial_reading" class="form-control" placeholder="e.g. 4500.0" value="{{ form.get('initial_reading', '') }}" required>
          </div>
        </div>

        <button type="submit" class="btn btn-volt w-100 mt-2">Register</button>
      </form>

      <p class="text-center text-muted-soft mt-4 mb-0">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
